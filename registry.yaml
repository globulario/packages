# Canonical Package Registry — single source of truth for all Globular packages.
#
# Every package in the platform is listed here. Build scripts, controller logic,
# node-agent classification, and CI pipelines should read from this file instead
# of maintaining their own hardcoded lists.
#
# Fields:
#   name                 — package name (must match metadata/ dir and pkg-map.json key)
#   kind                 — service | infrastructure | command
#   binary               — entrypoint binary name
#   go_target            — Go build path relative to golang/ (empty = third-party)
#   systemd_unit         — systemd unit name (default: globular-{name}.service)
#   version_source       — platform (stamped from release tag) | self (binary reports own version)
#   publisher_id         — artifact publisher (default: core@globular.io)
#   control_plane_critical — true if required before workloads can start
#   day0_required        — true if must be installed during Day-0 bootstrap
#   day1_join_required   — true if must be present before a joining node can operate
#   skip_runtime_check   — true for command-like packages with no systemd unit
#   bootstrap_tier       — foundation | core_control | supporting | workload
#   profiles             — list of node profiles that require this package
#   provides             — gRPC service IDs this package exposes
#   requires             — gRPC service IDs this package depends on
#   hard_deps            — packages that must be installed first
#
# Updating this file:
#   1. Add or modify the entry
#   2. Run: python3 scripts/validate-registry.py (when available)
#   3. Regenerate pkg-map.json: python3 scripts/gen-pkg-map.py (when available)

