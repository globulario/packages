    version_source: self
    publisher_id: core@globular.io
    control_plane_critical: true
    day0_required: true
    day1_join_required: true
    skip_runtime_check: false
    bootstrap_tier: foundation
    profiles: [core]
    provides: []
    requires: []
    hard_deps: []

