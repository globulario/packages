version: 1

metadata:
  name: xds
  version: "0.0.1"
  kind: infrastructure
  description: "xDS control plane that provides dynamic Envoy configuration for service discovery and routing."
  keywords: [xds, envoy, service-discovery, control-plane, routing]
  license: MIT
  provides_capabilities: [service-mesh]
  health_check:
    unit: globular-xds.service

steps:
  - id: ensure-user-group
    type: ensure_user_group
    user: globular
    group: globular
    home: "{{.StateDir}}"
    shell: /usr/sbin/nologin
    system: true

  - id: ensure-dirs
    type: ensure_dirs
    dirs:
      - path: "{{.Prefix}}"
        owner: root
        group: root
        mode: 0755
      - path: "{{.Prefix}}/bin"
        owner: root
        group: root
        mode: 0755

      - path: "{{.StateDir}}"
        owner: globular
        group: globular
        mode: 0750
      - path: "{{.StateDir}}/services"
        owner: globular
        group: globular
        mode: 0750
      - path: "{{.StateDir}}/xds"
        owner: globular
        group: globular
        mode: 0750

      # TLS directories (certificates auto-generated by xDS at pki/xds/current/)
      - path: "{{.StateDir}}/pki"
        owner: globular
        group: globular
        mode: 0750

      - path: "/run/globular"
        owner: globular
        group: globular
        mode: 0755
      - path: "/run/globular/envoy"
        owner: globular
        group: globular
        mode: 0755

  # xds uses its own config format
  - id: install-xds-config
    type: install_files
    files:
      - path: "{{.StateDir}}/xds/xds.yaml"
        owner: root
        group: root
        mode: 0644
        atomic: true
        skip_if_exists: true
        content: |
          # gRPC server address for xDS control plane
          grpc:
            address: "0.0.0.0:18000"

          # TLS configuration: Omitted to use automatic canonical PKI paths
          # xDS will auto-generate certs at: {{.StateDir}}/pki/xds/current/tls.{crt,key}
          # and use CA at: {{.StateDir}}/pki/ca.pem

          # Logging configuration
          logging:
            level: "info"

          # Runtime configuration
          runtime:
            state_dir: "{{.StateDir}}"

      # Watcher config for service discovery from etcd
      - path: "{{.StateDir}}/xds/config.json"
        owner: globular
        group: globular
        mode: 0644
        atomic: true
        skip_if_exists: true
        content: |
          {
            "etcd_endpoints": ["https://{{.NodeIP}}:2379"]
          }

  # Install binaries/config from packaged payload when available.
  - id: install-xds-binary
    type: install_package_payload
    install_bins: true
    install_config: true
    install_spec: false
    install_systemd: false

  - id: install-xds-service
    type: install_services
    units:
      - name: globular-xds.service
        owner: root
        group: root
        mode: 0644
        atomic: true
        content: |
          [Unit]
          Description=Globular xDS Control Plane
          After=network-online.target globular-etcd.service
          Wants=network-online.target globular-etcd.service

          [Service]
          Type=simple
          User=globular
          Group=globular
          Environment=GLOBULAR_SERVICES_DIR={{.StateDir}}/services
          RuntimeDirectory=globular globular/envoy
          RuntimeDirectoryMode=0755
          RuntimeDirectoryPreserve=yes
          ExecStart={{.Prefix}}/bin/xds --config {{.StateDir}}/xds/xds.yaml
          Restart=on-failure
          RestartSec=2
          LimitNOFILE=524288

          [Install]
          WantedBy=multi-user.target

  - id: enable-xds
    type: enable_services
    services:
      - globular-xds.service

  - id: start-xds
    type: start_services
    services:
      - globular-xds.service
    restart_on_files:
      globular-xds.service:
        - "{{.StateDir}}/xds/xds.yaml"
    binaries:
      globular-xds.service: xds

  - id: health-xds
    type: health_checks
    services:
      - globular-xds.service
