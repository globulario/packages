version: 1

metadata:
  name: envoy
  version: "1.35.3"
  kind: infrastructure
  description: "L7 edge proxy handling TLS termination, gRPC-Web translation, and dynamic service routing."
  keywords: [envoy, proxy, tls, grpc-web, load-balancer, routing]
  license: Apache-2.0
  entrypoint: envoy
  provides_capabilities: [http-proxy]
  runtime_local_dependencies: [xds]
  health_check:
    unit: globular-envoy.service
    port: 8443

steps:
  - id: ensure-user-group
    type: ensure_user_group
    user: globular
    group: globular
    home: "{{.StateDir}}"
    shell: /usr/sbin/nologin
    system: true

  - id: ensure-dirs
    type: ensure_dirs
    dirs:
      - path: "{{.Prefix}}"
        owner: root
        group: root
        mode: 0755
      - path: "{{.Prefix}}/bin"
        owner: root
        group: root
        mode: 0755

      - path: "{{.StateDir}}"
        owner: globular
        group: globular
        mode: 0755
      - path: "{{.StateDir}}/services"
        owner: globular
        group: globular
        mode: 0750

      - path: "{{.LogDir}}"
        owner: globular
        group: globular
        mode: 0755
      - path: "{{.LogDir}}/envoy"
        owner: globular
        group: globular
        mode: 0755

      # TLS directories (certificates must be provisioned by Day-0 bootstrap)
      # Envoy gets TLS config via xDS (INV-PKI-1: canonical paths)
      - path: "{{.StateDir}}/pki"
        owner: globular
        group: globular
        mode: 0750

      - path: "/run/globular"
        owner: globular
        group: globular
        mode: 0755
      - path: "/run/globular/envoy"
        owner: globular
        group: globular
        mode: 0755

  - id: install-envoy-bin
    type: install_binaries

  # Install packaged payload (binary + config) produced by build.sh
  - id: install-envoy-payload
    type: install_package_payload
    install_bins: true
    install_config: true
    install_spec: false
    install_systemd: false

  - id: install-envoy-service
    type: install_services
    units:
      - name: globular-envoy.service
        owner: root
        group: root
        mode: 0644
        atomic: true
        content: |
          [Unit]
          Description=Globular Envoy Proxy
          After=network-online.target globular-xds.service
          Wants=network-online.target globular-xds.service

          [Service]
          Type=simple
          User=globular
          Group=globular
          Environment=GLOBULAR_SERVICES_DIR={{.StateDir}}/services
          AmbientCapabilities=CAP_NET_BIND_SERVICE
          CapabilityBoundingSet=CAP_NET_BIND_SERVICE
          NoNewPrivileges=true
          ExecStartPre=/bin/sh -c 'for i in $(seq 1 60); do [ -s /run/globular/envoy/envoy-bootstrap.json ] && exit 0; sleep 1; done; echo "envoy-bootstrap.json not ready"; exit 1'
          ExecStart={{.Prefix}}/bin/envoy -c /run/globular/envoy/envoy-bootstrap.json --log-level info
          Restart=on-failure
          RestartSec=2
          LimitNOFILE=524288
          StandardOutput=journal
          StandardError=journal

          [Install]
          WantedBy=multi-user.target

  - id: enable-envoy
    type: enable_services
    services:
      - globular-envoy.service

  - id: start-envoy
    type: start_services
    services:
      - globular-envoy.service
    binaries:
      globular-envoy.service: envoy

  - id: health-envoy
    type: health_checks
    services:
      - globular-envoy.service
