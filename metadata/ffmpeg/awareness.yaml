apiVersion: awareness.globular.io/v1
kind: AwarenessContract
service: ffmpeg
package: ffmpeg
package_kind: command
summary: >
  ffmpeg binary for audio/video transcoding. Used by the media service for
  format conversion, thumbnail extraction, and streaming preparation. Standalone
  CLI invoked only within the node-agent supervisor boundary. Has no systemd unit
  and manages no cluster state.

owns:
  etcd_keys: []
  systemd_units: []
  filesystem_paths:
    - /usr/local/bin/ffmpeg
  event_types: []

reads:
  etcd_keys: []

writes:
  etcd_keys: []

depends_on: []

emits: []

subscribes: []

invariants:
  - command.checksum_must_match_installed
  - command.execution_within_supervisor_only

forbidden_fixes:
  - execute_outside_node_agent_supervisor

known_failure_modes:
  - id: binary_checksum_mismatch
    description: >
      If the installed binary checksum does not match the repository manifest,
      the command is considered corrupted.
    diagnosis: "sha256sum /usr/local/bin/ffmpeg; compare against package manifest."
    remedy: "Reinstall via node-agent package install workflow."

safe_degraded_modes:
  - "If ffmpeg is absent, media transcoding fails; other cluster services are unaffected."

remediation_workflows:
  - node-package-repair

required_tests:
  - TestChecksumValidationOnInstall

required_permissions: []

admission:
  strict: false
  allow_unknown_dependencies: true
  allow_privileged_state_writes: false
