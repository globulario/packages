version: 1

metadata:
  name: sctool
  version: "3.8.1"
  kind: command
  description: "Scylla Manager CLI client for scheduling repairs, backups, and managing ScyllaDB clusters."
  keywords: [sctool, scylla-manager, cli, repair, backup, scylladb]
  license: Proprietary

# sctool CLI tool — Scylla Manager client for backup, repair, and cluster management.
entrypoint: bin/sctool

steps:
  - id: ensure-user-group
    type: ensure_user_group
    user: globular
    group: globular
    home: "{{.StateDir}}"
    shell: /usr/sbin/nologin
    system: true

  - id: ensure-dirs
    type: ensure_dirs
    dirs:
      - path: "{{.Prefix}}"
        owner: root
        group: root
        mode: 0755
      - path: "{{.Prefix}}/bin"
        owner: root
        group: root
        mode: 0755
      - path: "/usr/local/bin"
        owner: root
        group: root
        mode: 0755

  # Install sctool binary from the packaged payload
  - id: install-sctool-binary
    type: install_package_payload
    install_bins: true
    install_config: false
    install_spec: false
    install_systemd: false

  # Provide a stable command name on PATH: /usr/local/bin/sctool
  - id: install-sctool-wrapper
    type: install_files
    files:
      - path: "/usr/local/bin/sctool"
        owner: root
        group: root
        mode: 0755
        atomic: true
        content: |
          #!/bin/sh
          set -e
          exec "{{.Prefix}}/bin/sctool" "$@"
