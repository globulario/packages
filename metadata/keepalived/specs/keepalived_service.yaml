version: 1

metadata:
  name: keepalived
  version: "0.0.1"
  kind: infrastructure
  description: "VRRP-based virtual IP failover daemon for high-availability cluster networking."
  keywords: [keepalived, vrrp, failover, high-availability, vip]
  license: GPL-2.0
  entrypoint: noop
  install_bins: false

steps:
  # Note: keepalived runs as root (requires privileges for VRRP and VIP management)
  # No need for globular user/group for this service

  - id: ensure-dirs
    type: ensure_dirs
    dirs:
      - path: /etc/keepalived
        owner: root
        group: root
        mode: 0755

      - path: "{{.Prefix}}/bin"
        owner: root
        group: root
        mode: 0755

  # Skip payload installation (keepalived is an OS package, not a bundled binary)
  - id: install-payload
    type: install_package_payload
    install_bins: false
    install_config: false
    install_spec: false
    install_systemd: false

  # Install keepalived OS package (Debian/Ubuntu)
  # Also install dependencies for health check script
  - id: install-keepalived-package
    type: install_os_packages
    packages:
      - keepalived
      - iproute2      # Provides 'ss' command for port checks
      - netcat-openbsd  # Provides 'nc' command as fallback

  # Install health check script
  # This script is called by keepalived vrrp_script to gate VIP ownership
  - id: install-health-script
    type: install_files
    files:
      - path: "{{.Prefix}}/bin/check-ingress.sh"
        owner: root
        group: root
        mode: 0755
        content: |
          #!/bin/bash
          # Health check script for keepalived ingress VIP
          # Checks that required TCP ports are listening locally
          # Generated by Globular package installer

          set -e

          # Configuration file with ports to check (one per line)
          PORTS_CONFIG="/etc/keepalived/check-ports.conf"

          # Default ports if config file is missing
          DEFAULT_PORTS="443"

          # Read ports from config file or use defaults
          if [[ -f "$PORTS_CONFIG" ]]; then
              PORTS=$(grep -v '^#' "$PORTS_CONFIG" | grep -v '^[[:space:]]*$')
          else
              PORTS="$DEFAULT_PORTS"
          fi

          # Check each port
          for PORT in $PORTS; do
              # Try ss first (faster and more reliable)
              if command -v ss >/dev/null 2>&1; then
                  if ! ss -lnt | grep -q ":${PORT} "; then
                      echo "Port ${PORT} not listening (checked with ss)" >&2
                      exit 1
                  fi
              # Fallback to nc
              elif command -v nc >/dev/null 2>&1; then
                  if ! nc -z -w 1 127.0.0.1 "$PORT" 2>/dev/null; then
                      echo "Port ${PORT} not listening (checked with nc)" >&2
                      exit 1
                  fi
              else
                  echo "Neither ss nor nc available for port check" >&2
                  exit 1
              fi
          done

          # All checks passed
          exit 0

  # Verify keepalived binary was installed successfully
  - id: verify-keepalived
    type: health_checks
    checks:
      - name: keepalived-binary
        type: command_exists
        command: /usr/sbin/keepalived

  # Note: keepalived config (/etc/keepalived/keepalived.conf) is managed by node-agent
  # Node-agent will enable/start the service when IngressSpec.mode=vip_failover
  # We do NOT enable/start here to avoid activating keepalived before it's configured
