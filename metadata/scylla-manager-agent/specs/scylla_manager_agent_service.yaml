version: 1

metadata:
  name: scylla_manager_agent
  version: "3.8.1"
  kind: infrastructure
  description: "ScyllaDB Manager agent that runs on each node to execute repair and backup operations."
  keywords: [scylla-manager-agent, scylladb, agent, repair, backup]
  license: Proprietary
  entrypoint: scylla_manager_agent

steps:
  - id: ensure-user-group
    type: ensure_user_group
    user: globular
    group: globular
    home: "{{.StateDir}}"
    shell: /usr/sbin/nologin
    system: true

  - id: ensure-dirs
    type: ensure_dirs
    dirs:
      - path: "{{.Prefix}}"
        owner: root
        group: root
        mode: 0755
      - path: "{{.Prefix}}/bin"
        owner: root
        group: root
        mode: 0755

      - path: "{{.StateDir}}"
        owner: globular
        group: globular
        mode: 0750
      - path: "{{.StateDir}}/scylla-manager-agent"
        owner: scylla
        group: globular
        mode: 0750

  - id: install-scylla-manager-agent-binary
    type: install_package_payload
    install_bins: true
    install_config: false
    install_spec: false
    install_systemd: false

  - id: install-scylla-manager-agent-config
    type: install_files
    files:
      - path: "{{.StateDir}}/scylla-manager-agent/scylla-manager-agent.yaml"
        owner: scylla
        group: globular
        mode: 0640
        atomic: true
        skip_if_exists: true
        content: |
          # Scylla Manager Agent configuration (managed by Globular)
          # auth_token is auto-generated by install-day0.sh
          #auth_token:

  - id: install-scylla-manager-agent-service
    type: install_services
    units:
      - name: globular-scylla-manager-agent.service
        owner: root
        group: root
        mode: 0644
        atomic: true
        content: |
          [Unit]
          Description=Globular Scylla Manager Agent
          After=network-online.target scylla-server.service
          Wants=network-online.target scylla-server.service

          [Service]
          Type=simple
          User=scylla
          Group=scylla
          SupplementaryGroups=globular
          WorkingDirectory={{.StateDir}}/scylla-manager-agent
          ExecStart={{.Prefix}}/bin/scylla_manager_agent --config-file {{.StateDir}}/scylla-manager-agent/scylla-manager-agent.yaml
          Restart=on-failure
          RestartSec=5
          LimitNOFILE=100000

          [Install]
          WantedBy=multi-user.target

  - id: enable-scylla-manager-agent
    type: enable_services
    services:
      - globular-scylla-manager-agent.service

  - id: start-scylla-manager-agent
    type: start_services
    services:
      - globular-scylla-manager-agent.service
    binaries:
      globular-scylla-manager-agent.service: scylla_manager_agent

  - id: health-scylla-manager-agent
    type: health_checks
    services:
      - globular-scylla-manager-agent.service
